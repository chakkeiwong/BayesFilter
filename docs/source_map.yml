    structural_deterministic_dynamics:
      destination: docs/chapters/ch18b_structural_deterministic_dynamics.tex
      reason: >
        Documents the serious DSGE filtering design issue that nonlinear
        filters must respect exogenous shock-driven state blocks and
        deterministic endogenous/accounting state transitions rather than
        treating all state coordinates as exchangeable noisy Gaussian
        coordinates. The revised BayesFilter chapter now states the predictive
        law in structural-transition form, distinguishes deterministic
        completion from zero predictive variance, and aligns nonlinear
        approximation language with BayesFilter contract and claim-discipline
        chapters.
